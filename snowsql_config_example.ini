# ============================================================================
# SnowSQL Configuration — Add this to ~/.snowsql/config
# ============================================================================
# Location: ~/.snowsql/config (create if doesn't exist)
# This creates a named connection "skypulse" that deploy.sh can reference.
# ============================================================================

[connections.skypulse]
accountname = your-org-your-account
username = your_username
password = your_password
rolename = ACCOUNTADMIN
warehousename = SKYPULSE_TRANSFORM_WH
dbname = SKYPULSE_AI
schemaname = SILVER

# Optional: If using key-pair authentication (more secure)
# private_key_path = /path/to/rsa_key.p8
